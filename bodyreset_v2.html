<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0702">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Body Reset">
<title>Body Reset — Transformation</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --fire:#f97316;--fire2:#ea580c;--amber:#fbbf24;
  --red:#ef4444;--water:#38bdf8;
  --bg:#0a0702;--card:#120d05;--card2:#1a1108;
  --border:#2a1f0d;--border2:#3a2c12;
  --text:#fef3c7;--muted:#d97706;--dim:#78450a;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse at 50% 0%,rgba(249,115,22,0.08) 0%,transparent 60%)}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{padding:52px 20px 16px;background:linear-gradient(180deg,#130a02 0%,var(--bg) 100%);border-bottom:1px solid rgba(249,115,22,0.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-eyebrow{font-size:10px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;font-weight:600}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--fire);letter-spacing:2px;line-height:1}
.streak-pill{background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.3);border-radius:20px;padding:7px 16px;font-size:13px;color:var(--fire);font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 16px 100px}

/* HERO */
.hero-card{background:linear-gradient(135deg,#1a0d02 0%,#0d0600 100%);border:1px solid rgba(249,115,22,0.25);border-radius:24px;padding:22px 18px 18px;margin-bottom:14px;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,0.1) 0%,transparent 70%);pointer-events:none}
.hero-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}
.hero-days{font-family:'Bebas Neue',sans-serif;font-size:88px;color:var(--fire);line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 40px rgba(249,115,22,0.3)}
.hero-unit{font-size:10px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.ring-wrap{position:relative;width:100px;height:100px}
.ring-svg{width:100px;height:100px}
.ring-inner{position:absolute;inset:14px;border-radius:50%;background:rgba(249,115,22,0.06);display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--fire);line-height:1}
.ring-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.mile-row{display:flex;align-items:center;gap:10px;margin-top:4px}
.mile-bar{flex:1;background:rgba(255,255,255,0.06);border-radius:6px;height:8px}
.mile-fill{height:8px;border-radius:6px;background:linear-gradient(90deg,#ea580c,#fbbf24);transition:width 1s ease}
.mile-txt{font-size:11px;color:var(--dim);white-space:nowrap}

/* ── ANTI-GRIGNOTAGE ── */
.repas-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:14px}
.repas-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amber);letter-spacing:1px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.repas-sub{font-size:11px;color:var(--dim);margin-bottom:14px;line-height:1.5}
.repas-slots{display:grid;gap:10px}
.repas-slot{border-radius:14px;padding:14px;border:2px dashed var(--border2);background:transparent;transition:all 0.2s;cursor:pointer;position:relative}
.repas-slot.done{background:rgba(249,115,22,0.08);border:2px solid rgba(249,115,22,0.3);cursor:default}
.repas-slot.skipped{background:rgba(120,69,10,0.08);border:2px dashed var(--border);opacity:0.5}
.slot-top{display:flex;align-items:center;justify-content:space-between}
.slot-left{display:flex;align-items:center;gap:10px}
.slot-icon{font-size:22px}
.slot-name{font-size:14px;font-weight:700;color:var(--text)}
.slot-time{font-size:11px;color:var(--dim);margin-top:1px}
.slot-status{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.slot-status.ok{background:rgba(249,115,22,0.15);color:var(--fire)}
.slot-status.waiting{background:var(--border);color:var(--dim)}
.slot-status.skip{background:rgba(120,69,10,0.15);color:var(--dim)}
.slot-desc{font-size:12px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5}

/* COMPTEUR REPAS */
.meal-counter{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border:1px solid var(--border2);border-radius:14px;padding:12px 16px;margin-bottom:12px}
.meal-count-left{display:flex;align-items:center;gap:10px}
.meal-count-num{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1}
.meal-count-num.safe{color:var(--fire)}
.meal-count-num.danger{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.meal-count-lbl{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.meal-dots{display:flex;gap:6px}
.meal-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all 0.3s}
.meal-dot.filled{background:var(--fire);border-color:var(--fire);box-shadow:0 0 8px rgba(249,115,22,0.4)}
.meal-dot.over{background:var(--red);border-color:var(--red)}

/* INTERDITS */
.interdits-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:14px}
.interdits-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--amber);letter-spacing:1px;margin-bottom:12px}
.interdits-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.interdit-item{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#fca5a5;font-weight:500}

/* WATER */
.water-card{background:linear-gradient(135deg,#03111e,#020c16);border:1px solid rgba(56,189,248,0.2);border-radius:20px;padding:16px;margin-bottom:14px}
.water-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.water-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--water);letter-spacing:1px}
.water-big{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--water);line-height:1}
.water-sub{font-size:10px;color:#0ea5e9;letter-spacing:1px}
.glasses-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.glass{width:32px;height:40px;border:2px solid rgba(56,189,248,0.25);border-radius:3px 3px 7px 7px;cursor:pointer;position:relative;overflow:hidden;transition:all 0.2s;background:transparent;display:flex;align-items:center;justify-content:center;font-size:14px}
.glass.filled{background:rgba(56,189,248,0.18);border-color:rgba(56,189,248,0.5)}
.glass.filled::after{content:'';position:absolute;bottom:0;left:0;right:0;height:55%;background:rgba(56,189,248,0.2);border-radius:0 0 5px 5px}
.water-bar{background:rgba(56,189,248,0.1);border-radius:6px;height:7px;margin-bottom:12px}
.water-bar-fill{height:7px;border-radius:6px;background:linear-gradient(90deg,#0284c7,#38bdf8);transition:width 0.8s ease}
.water-actions{display:flex;gap:8px}
.btn-water{flex:2;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.25);border-radius:12px;padding:12px;color:var(--water);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-water-sm{flex:1;background:transparent;border:1px solid var(--border2);border-radius:12px;padding:12px;color:var(--dim);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* CHECK-IN */
.checkin-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:14px}
.checkin-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);letter-spacing:1px;margin-bottom:4px}
.checkin-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-yes{background:linear-gradient(135deg,#431407,#7c2d12);border:1px solid rgba(249,115,22,0.4);border-radius:16px;padding:18px 10px;color:var(--fire);font-weight:700;font-size:14px;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;transition:transform 0.15s}
.btn-yes:active{transform:scale(0.97)}
.btn-no{background:var(--card2);border:1px solid var(--border2);border-radius:16px;padding:18px 10px;color:#9ca3af;font-weight:700;font-size:14px;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif}
.checked-ok{background:linear-gradient(135deg,#431407,#7c2d12);border:1px solid rgba(249,115,22,0.3);border-radius:14px;padding:16px;text-align:center;color:var(--fire);font-size:14px;font-weight:600}
.checked-fail{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:14px;padding:16px;text-align:center;color:#fca5a5;font-size:14px;font-weight:600}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
.stat-icon{font-size:22px;margin-bottom:6px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);line-height:1;letter-spacing:1px}
.stat-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:3px;font-weight:600}

/* CALENDAR */
.cal-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:14px}
.cal-nav-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--fire);letter-spacing:2px}
.cal-arrows{display:flex;gap:8px}
.cal-arr{background:var(--card2);border:1px solid var(--border2);border-radius:8px;width:32px;height:32px;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-dnames{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-dn{text-align:center;font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;padding:3px 0;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-c{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--dim);position:relative;flex-direction:column;gap:1px}
.cal-c.today{color:var(--text)}
.cal-c.today::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--fire)}
.cal-c.clean{background:rgba(249,115,22,0.2);color:var(--fire);border:1px solid rgba(249,115,22,0.3)}
.cal-c.cheat{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.cal-dot-row{display:flex;gap:2px;justify-content:center}
.cal-mdot{width:4px;height:4px;border-radius:50%;background:var(--fire);opacity:0.7}
.cal-legend{display:flex;gap:16px;margin-top:12px}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim)}
.leg-dot{width:10px;height:10px;border-radius:3px}

/* BADGES */
.badges-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge-c{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center}
.badge-c.earned{background:#1a0d02;border-color:rgba(249,115,22,0.3)}
.badge-c.locked{opacity:0.3}
.badge-ico{font-size:32px;margin-bottom:6px}
.badge-nm{font-size:12px;font-weight:600;color:var(--dim)}
.badge-c.earned .badge-nm{color:var(--fire)}
.badge-rq{font-size:10px;color:#4b5563;margin-top:2px}

/* JOURNAL */
.sec-lbl{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;font-weight:600}
textarea{width:100%;min-height:100px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;color:var(--text);font-size:14px;resize:vertical;font-family:'DM Sans',sans-serif;line-height:1.65}
textarea:focus{outline:none;border-color:rgba(249,115,22,0.35)}
textarea::placeholder{color:var(--dim)}
.btn-save{margin-top:10px;width:100%;background:linear-gradient(135deg,#431407,#7c2d12);border:1px solid rgba(249,115,22,0.3);border-radius:12px;padding:14px;color:var(--fire);font-weight:700;font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif}
.j-entry{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.j-meta{display:flex;justify-content:space-between;margin-bottom:6px}
.j-day{font-size:11px;color:var(--fire);font-weight:700}
.j-date{font-size:11px;color:var(--dim)}
.j-text{font-size:13px;color:#fde68a;line-height:1.65}

/* MODAL REPAS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:flex-end;justify-content:center;z-index:800;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#130900;border:1px solid var(--border2);border-radius:22px;padding:24px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;animation:su 0.28s ease}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--dim);margin-bottom:16px;line-height:1.5}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.chip{background:var(--border);border:1px solid var(--border2);border-radius:20px;padding:7px 13px;color:var(--dim);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.chip.on-fire{background:rgba(249,115,22,0.15);border-color:var(--fire);color:var(--fire);font-weight:600}
.chip.on-red{background:rgba(239,68,68,0.15);border-color:#ef4444;color:#fca5a5;font-weight:600}
.m-actions{display:flex;gap:10px;margin-top:4px}
.btn-cancel{flex:1;background:var(--border);border:none;border-radius:12px;padding:14px;color:var(--dim);font-weight:600;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-confirm-fire{flex:2;background:linear-gradient(135deg,#431407,#7c2d12);border:1px solid rgba(249,115,22,0.4);border-radius:12px;padding:14px;color:var(--fire);font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-confirm-red{flex:2;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);border-radius:12px;padding:14px;color:#fca5a5;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0a0600;border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.nav-btn{flex:1;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;position:relative}
.nav-icon{font-size:20px}
.nav-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);font-family:'DM Sans',sans-serif;font-weight:600;transition:color 0.2s}
.nav-btn.active .nav-lbl{color:var(--fire)}
.nav-dot{width:20px;height:2px;border-radius:2px;background:var(--fire);position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:none}
.nav-btn.active .nav-dot{display:block}

/* TOAST */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);border-radius:12px;padding:11px 22px;font-size:13px;color:#fff;z-index:1000;white-space:nowrap;animation:ti 0.3s ease;pointer-events:none;font-family:'DM Sans',sans-serif;font-weight:600}
.toast.ok{background:#431407;border:1px solid var(--fire);color:var(--fire)}
.toast.ko{background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5}
.toast.h2o{background:#0c2340;border:1px solid var(--water);color:var(--water)}
.toast.warn{background:#78350f;border:1px solid var(--amber);color:var(--amber)}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.divider{height:1px;background:var(--border);margin:18px 0}

/* ALERTE GRIGNOTAGE */
.grignot-alert{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.35);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.grignot-icon{font-size:28px;flex-shrink:0}
.grignot-text{font-size:13px;color:#fca5a5;line-height:1.5;font-weight:500}
.grignot-title{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--red);letter-spacing:1px;margin-bottom:2px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-eyebrow">Transformation corporelle</div>
      <div class="header-title">BODY RESET</div>
    </div>
    <div class="streak-pill" id="streakPill">JOUR 0</div>
  </div>
  <div class="content" id="content"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="setTab('home')" id="nav-home"><span class="nav-icon">🔥</span><span class="nav-lbl">Aujourd'hui</span><div class="nav-dot"></div></button>
    <button class="nav-btn" onclick="setTab('repas')" id="nav-repas"><span class="nav-icon">🍽️</span><span class="nav-lbl">Repas</span><div class="nav-dot"></div></button>
    <button class="nav-btn" onclick="setTab('calendar')" id="nav-calendar"><span class="nav-icon">📅</span><span class="nav-lbl">Calendrier</span><div class="nav-dot"></div></button>
    <button class="nav-btn" onclick="setTab('journal')" id="nav-journal"><span class="nav-icon">📝</span><span class="nav-lbl">Journal</span><div class="nav-dot"></div></button>
    <button class="nav-btn" onclick="setTab('badges')" id="nav-badges"><span class="nav-icon">🏆</span><span class="nav-lbl">Paliers</span><div class="nav-dot"></div></button>
  </nav>
</div>

<!-- Modal repas -->
<div class="modal-overlay" id="mealModal">
  <div class="modal">
    <div class="modal-title" id="mealModalTitle" style="color:var(--fire)">🍽️ ENREGISTRER LE REPAS</div>
    <div class="modal-sub" id="mealModalSub">Qu'as-tu mangé lors de ce repas ?</div>
    <div class="chips" id="mealChips"></div>
    <textarea id="mealNote" placeholder="Détails optionnels — ex: salade de poulet, riz vapeur, pomme..." style="min-height:80px;margin-bottom:14px"></textarea>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closeMeal()">Annuler</button>
      <button class="btn-confirm-fire" onclick="confirmMeal()">✓ Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal cheat -->
<div class="modal-overlay" id="cheatModal">
  <div class="modal">
    <div class="modal-title" style="color:#f87171">😔 JOURNÉE DIFFICILE</div>
    <div class="modal-sub">Sois honnête. Qu'as-tu consommé ?</div>
    <div class="chips" id="cheatChips"></div>
    <textarea id="cheatNote" placeholder="Note optionnelle..." style="min-height:70px;margin-bottom:14px"></textarea>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closeCheat()">Annuler</button>
      <button class="btn-confirm-red" onclick="confirmCheat()">Enregistrer & Repartir</button>
    </div>
  </div>
</div>

<script>
// ─── STORAGE ─────────────────────────────────────────────────────────────────
const KEY='bodyreset_v2';
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function defaultData(){return{startDate:todayStr(),days:{},journal:[],bestStreak:0,waterGoal:8}}
function load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):defaultData()}catch{return defaultData()}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch{}}
let state=load();

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const MAX_MEALS=4;
const MEAL_SLOTS=[
  {id:'petit-dej',icon:'🌅',name:'Petit-déjeuner',time:'7h – 9h',   tip:'Protéines + fruits. Pas de sucre raffiné.'},
  {id:'dejeuner', icon:'☀️', name:'Déjeuner',      time:'12h – 14h', tip:'Ton repas principal. Légumes, protéines, féculents complets.'},
  {id:'gouter',   icon:'🍎', name:'Collation',     time:'16h – 17h', tip:'Fruits, oléagineux. Pas de gâteaux ni chips.'},
  {id:'diner',    icon:'🌙', name:'Dîner',         time:'19h – 21h', tip:'Léger. Légumes + protéines maigres. Pas après 21h.'},
];
const MEAL_FOODS=['Légumes','Fruits','Poulet/dinde','Poisson','Riz complet','Pâtes complètes','Œufs','Légumineuses','Fromage (peu)','Pain complet','Autre sain'];
const CHEAT_CAUSES=['Junk food','Soda / jus sucré','Gâteau / sucré','Chips / snacks','Alcool','Pain blanc','Fast food','Plat industriel','Grignotage','Autre'];
const INTERDITS=[{icon:'🍟',text:'Junk food'},{icon:'🥤',text:'Sodas & jus'},{icon:'🍰',text:'Gâteaux'},{icon:'🍟',text:'Chips'},{icon:'🍺',text:'Alcool'},{icon:'🍞',text:'Pain blanc'}];
const BADGES=[
  {id:'d1',icon:'🔥',label:'Jour 1 — Allumé',days:1},
  {id:'d3',icon:'💪',label:'3 jours',days:3},
  {id:'d7',icon:'⚡',label:'1 semaine',days:7},
  {id:'d14',icon:'🛡️',label:'2 semaines',days:14},
  {id:'d30',icon:'🔥',label:'1 mois — Transformé',days:30},
  {id:'d60',icon:'👊',label:'2 mois',days:60},
  {id:'d90',icon:'👑',label:'90 jours — Champion',days:90},
  {id:'d180',icon:'🌟',label:'6 mois — Légende',days:180},
];
const MILESTONES=[7,14,30,60,90,180,365];
const QUOTES=[
  {q:'Le corps obtient ce que l\'esprit croit possible.',a:'Colin Powell'},
  {q:'Chaque calorie propre est une brique de ta transformation.',a:'Inconnu'},
  {q:'4 repas. Pas un de plus. La discipline c\'est ça.',a:'Body Reset'},
  {q:'L\'eau est le seul carburant dont ton corps a vraiment besoin.',a:'Inconnu'},
  {q:'Brûle les mauvaises habitudes avant qu\'elles te brûlent.',a:'Inconnu'},
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentTab='home';
let calMonth=new Date().getMonth();
let calYear=new Date().getFullYear();
let cheatCause='';
let mealFoods=[];
let activeMealSlot=null;

function todayData(){
  const t=todayStr();
  if(!state.days[t])state.days[t]={clean:null,water:0,meals:{}};
  if(!state.days[t].meals)state.days[t].meals={};
  return state.days[t];
}
function getMealsCount(){return Object.keys(todayData().meals).filter(k=>todayData().meals[k]?.done).length}
function getStreak(){
  let s=0;const d=new Date();
  for(let i=0;i<1000;i++){
    const str=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const day=state.days[str];
    if(day&&day.clean===true){s++;d.setDate(d.getDate()-1)}
    else if(str===todayStr()&&(!day||day.clean===null)){d.setDate(d.getDate()-1);continue}
    else break;
  }
  return s;
}
function getBest(){return Math.max(getStreak(),state.bestStreak||0)}
function getTotalClean(){return Object.values(state.days).filter(d=>d.clean===true).length}
function getRate(){const c=Object.values(state.days).filter(d=>d.clean!==null);if(!c.length)return 100;return Math.round(c.filter(d=>d.clean===true).length/c.length*100)}
function getNextMilestone(s){return MILESTONES.find(m=>m>s)||MILESTONES[MILESTONES.length-1]}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtDate(iso){return new Date(iso+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'})}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
  render();
  document.getElementById('content').scrollTop=0;
}

function render(){
  renderHeader();
  const el=document.getElementById('content');
  if(currentTab==='home')el.innerHTML=renderHome();
  if(currentTab==='repas')el.innerHTML=renderRepas();
  if(currentTab==='calendar')el.innerHTML=renderCalendar();
  if(currentTab==='journal')el.innerHTML=renderJournal();
  if(currentTab==='badges')el.innerHTML=renderBadges();
}
function renderHeader(){
  document.getElementById('streakPill').textContent='JOUR '+getStreak();
}

// ── HOME ──
function renderHome(){
  const streak=getStreak();
  const best=getBest();
  const td=todayData();
  const goal=state.waterGoal||8;
  const wPct=Math.min(td.water/goal*100,100);
  const next=getNextMilestone(streak);
  const prev=MILESTONES[MILESTONES.indexOf(next)-1]||0;
  const milePct=Math.min((streak-prev)/(next-prev)*100,100);
  const quote=QUOTES[Math.floor(Date.now()/86400000)%QUOTES.length];
  const mealsCount=getMealsCount();
  const rPct=Math.min(streak/30,1);
  const r=38;const circ=2*Math.PI*r;const off=circ-rPct*circ;

  const checkin=td.clean===true
    ?`<div class="checked-ok">🔥 JOURNÉE PROPRE — Tu brûles les calories, pas ta volonté !</div>`
    :td.clean===false
    ?`<div class="checked-fail">😔 Écart enregistré — Demain tu reprends le feu.</div>`
    :`<div style="font-size:13px;color:var(--dim);margin-bottom:12px;line-height:1.5">Pas de junk food ? Pas de soda ? Uniquement aliments vrais et eau ?</div>
      <div class="checkin-btns">
        <button class="btn-yes" onclick="markClean()"><span style="font-size:24px;display:block;margin-bottom:4px">🔥</span><span style="font-size:11px;letter-spacing:1px">JOURNÉE PROPRE</span></button>
        <button class="btn-no" onclick="openCheat()"><span style="font-size:24px;display:block;margin-bottom:4px">😔</span><span style="font-size:11px">J'ai craqué</span></button>
      </div>`;

  // Alerte grignotage si repas >= MAX
  const grignot=mealsCount>=MAX_MEALS
    ?`<div class="grignot-alert"><div class="grignot-icon">🚫</div><div><div class="grignot-title">STOP GRIGNOTAGE</div><div class="grignot-text">Tu as atteint tes 4 repas du jour. Ferme la cuisine jusqu'à demain. L'eau est ton seul ami maintenant.</div></div></div>`
    :'';

  return`
  <div class="hero-card">
    <div class="hero-top">
      <div>
        <div style="font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;font-weight:600;margin-bottom:4px">Jours sans junk food</div>
        <div class="hero-days">${String(streak).padStart(2,'0')}</div>
        <div class="hero-unit">JOURS CONSÉCUTIFS</div>
        <div class="mile-row"><div class="mile-bar"><div class="mile-fill" style="width:${milePct.toFixed(1)}%"></div></div><div class="mile-txt">${streak}/${next}j</div></div>
      </div>
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="7"/>
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="url(#fg)" stroke-width="7"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
            stroke-linecap="round" transform="rotate(-90 50 50)"/>
          <defs><linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ea580c"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient></defs>
        </svg>
        <div class="ring-inner"><div class="ring-pct">${Math.round(rPct*100)}%</div><div class="ring-lbl">du mois</div></div>
      </div>
    </div>
  </div>

  ${grignot}

  <!-- Compteur repas du jour -->
  <div class="meal-counter">
    <div class="meal-count-left">
      <div>
        <div class="meal-count-num ${mealsCount>=MAX_MEALS?'danger':'safe'}">${mealsCount}<span style="font-size:18px;color:var(--dim)">/${MAX_MEALS}</span></div>
        <div class="meal-count-lbl">Repas aujourd'hui</div>
      </div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--dim);text-align:right;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase">Créneaux</div>
      <div class="meal-dots">
        ${Array.from({length:MAX_MEALS},(_,i)=>`<div class="meal-dot ${i<mealsCount?(mealsCount>MAX_MEALS?'over':'filled'):''}"></div>`).join('')}
      </div>
    </div>
  </div>

  <!-- Interdits -->
  <div class="interdits-card">
    <div class="interdits-title">🚫 ÉLIMINÉ DE TON ASSIETTE</div>
    <div class="interdits-grid">
      ${INTERDITS.map(i=>`<div class="interdit-item"><span>❌</span><span>${i.icon} ${i.text}</span></div>`).join('')}
    </div>
  </div>

  <!-- Water -->
  <div class="water-card">
    <div class="water-header">
      <div class="water-title">💧 HYDRATATION</div>
      <div style="text-align:right"><div class="water-big">${td.water}<span style="font-size:14px;color:#0ea5e9"> /${goal}</span></div><div class="water-sub">VERRES D'EAU</div></div>
    </div>
    <div class="glasses-row">${Array.from({length:goal},(_,i)=>`<div class="glass ${i<td.water?'filled':''}" onclick="toggleGlass(${i})">${i<td.water?'💧':''}</div>`).join('')}</div>
    <div class="water-bar"><div class="water-bar-fill" style="width:${wPct.toFixed(1)}%"></div></div>
    <div class="water-actions">
      <button class="btn-water" onclick="addWater()">+ Un verre d'eau</button>
      <button class="btn-water-sm" onclick="resetWater()">Reset</button>
    </div>
  </div>

  <!-- Check-in -->
  <div class="checkin-card">
    <div class="checkin-title">CHECK-IN DU JOUR</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:12px">Résume ta journée alimentaire globale</div>
    ${checkin}
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-val">${best}J</div><div class="stat-lbl">Meilleur streak</div></div>
    <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val">${getRate()}%</div><div class="stat-lbl">Taux de réussite</div></div>
    <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val">${getTotalClean()}</div><div class="stat-lbl">Jours propres</div></div>
    <div class="stat-card"><div class="stat-icon">🍽️</div><div class="stat-val">${mealsCount}/${MAX_MEALS}</div><div class="stat-lbl">Repas du jour</div></div>
  </div>

  <div style="background:var(--card);border-left:3px solid var(--fire);border-radius:0 12px 12px 0;padding:12px 16px;font-size:13px;color:var(--dim);font-style:italic;line-height:1.7">
    « ${quote.q} »<div style="color:#3a1f08;margin-top:4px;font-size:11px;font-style:normal">— ${quote.a}</div>
  </div>`;
}

// ── REPAS ──
function renderRepas(){
  const td=todayData();
  const mealsCount=getMealsCount();
  const over=mealsCount>=MAX_MEALS;

  const slots=MEAL_SLOTS.map(slot=>{
    const done=td.meals[slot.id]?.done;
    const foods=td.meals[slot.id]?.foods||[];
    const note=td.meals[slot.id]?.note||'';
    return`
    <div class="repas-slot ${done?'done':''}" ${!done&&!over?`onclick="openMeal('${slot.id}')"`:''}">
      <div class="slot-top">
        <div class="slot-left">
          <span class="slot-icon">${slot.icon}</span>
          <div>
            <div class="slot-name">${slot.name}</div>
            <div class="slot-time">⏰ ${slot.time}</div>
          </div>
        </div>
        <div class="slot-status ${done?'ok':'waiting'}">${done?'✓ Fait':'En attente'}</div>
      </div>
      ${done&&(foods.length||note)?`<div class="slot-desc">${foods.length?'🥗 '+foods.join(', ')+'<br>':''} ${note?'📝 '+esc(note):''}</div>`:''}
      ${!done&&!over?`<div class="slot-desc">${slot.tip}</div>`:''}
      ${!done&&over?`<div class="slot-desc" style="color:var(--red)">🚫 Quota de 4 repas atteint. Pas de repas supplémentaire.</div>`:''}
    </div>`;
  }).join('');

  return`
  <div class="repas-card">
    <div class="repas-title">
      <span>🍽️ MES 4 REPAS</span>
      <span style="font-size:13px;color:${over?'var(--red)':'var(--fire)'}">${mealsCount}/${MAX_MEALS}</span>
    </div>
    <div class="repas-sub">Maximum 4 repas par jour. Zéro grignotage entre les repas. L'eau uniquement entre les créneaux.</div>

    ${over?`<div class="grignot-alert" style="margin-bottom:14px"><div class="grignot-icon">🚫</div><div><div class="grignot-title">CUISINE FERMÉE</div><div class="grignot-text">4 repas atteints. Ton corps n'a besoin de rien d'autre jusqu'à demain.</div></div></div>`:''}

    <div class="repas-slots">${slots}</div>
  </div>

  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px">
    <div class="sec-lbl">Règles anti-grignotage</div>
    ${[
      ['⏰','Respecte les créneaux horaires'],
      ['🚰','Entre les repas : eau uniquement'],
      ['🚫','Pas de 5ème repas, jamais'],
      ['🌙','Dernier repas avant 21h'],
      ['🍎','Si faim : un fruit compte comme collation'],
    ].map(([ic,txt])=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted)">${ic} ${txt}</div>`).join('')}
  </div>`;
}

// ── CALENDAR ──
function renderCalendar(){
  const months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const dnames=['L','M','M','J','V','S','D'];
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  let sdow=first.getDay();sdow=sdow===0?6:sdow-1;
  const today=todayStr();
  let cells=[];
  for(let i=0;i<sdow;i++)cells.push('<div class="cal-c"></div>');
  for(let d=1;d<=last.getDate();d++){
    const str=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dd=state.days[str];
    let cls='cal-c';
    if(str===today)cls+=' today';
    if(dd?.clean===true)cls+=' clean';
    else if(dd?.clean===false)cls+=' cheat';
    const mc=dd?.meals?Object.keys(dd.meals).filter(k=>dd.meals[k]?.done).length:0;
    const dots=mc>0?`<div class="cal-dot-row">${Array.from({length:Math.min(mc,4)},()=>'<div class="cal-mdot"></div>').join('')}</div>`:'';
    cells.push(`<div class="${cls}"><span>${d}</span>${dots}</div>`);
  }
  const mk=Object.keys(state.days).filter(k=>k.startsWith(calYear+'-'+String(calMonth+1).padStart(2,'0')));
  const clean=mk.filter(k=>state.days[k]?.clean===true).length;
  const cheat=mk.filter(k=>state.days[k]?.clean===false).length;
  return`
  <div class="cal-card">
    <div class="cal-nav-row">
      <div class="cal-month">${months[calMonth]} ${calYear}</div>
      <div class="cal-arrows"><button class="cal-arr" onclick="prevMonth()">‹</button><button class="cal-arr" onclick="nextMonth()">›</button></div>
    </div>
    <div class="cal-dnames">${dnames.map(d=>`<div class="cal-dn">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells.join('')}</div>
    <div class="cal-legend">
      <div class="leg"><div class="leg-dot" style="background:rgba(249,115,22,0.4)"></div>${clean} propres</div>
      <div class="leg"><div class="leg-dot" style="background:rgba(239,68,68,0.4)"></div>${cheat} écarts</div>
      <div class="leg">🔥 = repas du jour</div>
    </div>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px">
    <div class="sec-lbl">Ce mois</div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:var(--muted)">Jours propres</span><span style="color:var(--fire);font-weight:700">${clean} / ${last.getDate()}</span></div>
    <div style="background:rgba(255,255,255,0.06);border-radius:6px;height:8px"><div style="height:8px;border-radius:6px;background:linear-gradient(90deg,#ea580c,#fbbf24);width:${(clean/last.getDate()*100).toFixed(1)}%;transition:width 1s ease"></div></div>
  </div>`;
}

// ── JOURNAL ──
function renderJournal(){
  const entries=[...(state.journal||[])].reverse();
  const list=entries.length
    ?entries.map(e=>`<div class="j-entry"><div class="j-meta"><span class="j-day">JOUR ${e.streak} — ${e.clean?'🔥 Propre':'😔 Écart'}</span><span class="j-date">${fmtDate(e.date)}</span></div><div class="j-text">${esc(e.text)}</div></div>`).join('')
    :'<div style="text-align:center;color:var(--dim);padding:30px;font-size:14px">Pas encore d\'entrées.</div>';
  return`
  <div class="sec-lbl">Nouvelle entrée — Jour ${getStreak()}</div>
  <textarea id="jInput" placeholder="Comment tu te sens ? Qu'as-tu mangé ? Ton énergie, ton poids, ton moral..."></textarea>
  <button class="btn-save" onclick="saveJ()">🔥 Enregistrer</button>
  <div class="divider"></div>
  <div class="sec-lbl">Historique (${state.journal?.length||0})</div>${list}`;
}

// ── BADGES ──
function renderBadges(){
  const best=getBest();
  const earned=BADGES.filter(b=>best>=b.days).length;
  return`
  <div class="sec-lbl">Paliers débloqués ${earned}/${BADGES.length}</div>
  <div class="badges-grid">${BADGES.map(b=>{const ok=best>=b.days;return`<div class="badge-c ${ok?'earned':'locked'}"><div class="badge-ico">${ok?b.icon:'🔒'}</div><div class="badge-nm">${b.label}</div><div class="badge-rq">${b.days}j</div></div>`}).join('')}</div>
  <div class="divider"></div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px">
    <div class="sec-lbl">Résumé</div>
    ${[['🔥','Meilleur streak',getBest()+'j'],['✅','Jours propres',getTotalClean()],['📊','Taux réussite',getRate()+'%'],['🍽️','Repas max/jour','4 repas']]
      .map(([ic,lb,vl])=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--dim)">${ic} ${lb}</span><span style="color:var(--fire);font-weight:700">${vl}</span></div>`).join('')}
  </div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function openMeal(slotId){
  if(getMealsCount()>=MAX_MEALS){showToast('🚫 4 repas atteints. Cuisine fermée !','warn');return}
  activeMealSlot=slotId;
  mealFoods=[];
  const slot=MEAL_SLOTS.find(s=>s.id===slotId);
  document.getElementById('mealModalTitle').textContent='🍽️ '+slot.name.toUpperCase();
  document.getElementById('mealModalSub').textContent=slot.tip;
  document.getElementById('mealNote').value='';
  buildMealChips();
  document.getElementById('mealModal').classList.add('open');
}
function closeMeal(){document.getElementById('mealModal').classList.remove('open');activeMealSlot=null}
function buildMealChips(){
  document.getElementById('mealChips').innerHTML=MEAL_FOODS.map(f=>
    `<div class="chip ${mealFoods.includes(f)?'on-fire':''}" onclick="toggleFood('${f}')">${f}</div>`).join('');
}
function toggleFood(f){
  if(mealFoods.includes(f))mealFoods=mealFoods.filter(x=>x!==f);
  else mealFoods.push(f);
  buildMealChips();
}
function confirmMeal(){
  if(!activeMealSlot)return;
  const td=todayData();
  td.meals[activeMealSlot]={done:true,foods:mealFoods,note:document.getElementById('mealNote').value.trim(),time:new Date().toTimeString().slice(0,5)};
  const count=getMealsCount();
  save();closeMeal();
  if(count>=MAX_MEALS)showToast('🚫 4 repas atteints — Cuisine fermée !','warn');
  else showToast(`✓ Repas enregistré — ${count}/${MAX_MEALS} aujourd'hui`,'ok');
  render();
}

function addWater(){
  const td=todayData();const goal=state.waterGoal||8;
  if(td.water>=goal){showToast('💧 Objectif eau atteint !','h2o');return}
  td.water++;save();
  if(td.water===goal)showToast('🎉 Objectif eau atteint !','h2o');
  else showToast(`💧 ${td.water}/${goal} verres`,'h2o');
  render();
}
function resetWater(){todayData().water=0;save();render()}
function toggleGlass(i){const td=todayData();td.water=i<td.water?i:i+1;save();render()}

function markClean(){
  const td=todayData();td.clean=true;
  state.bestStreak=Math.max(getStreak(),state.bestStreak||0);
  save();showToast('🔥 JOURNÉE PROPRE !','ok');render();
}
function openCheat(){
  cheatCause='';buildCheatChips();
  document.getElementById('cheatNote').value='';
  document.getElementById('cheatModal').classList.add('open');
}
function closeCheat(){document.getElementById('cheatModal').classList.remove('open')}
function buildCheatChips(){
  document.getElementById('cheatChips').innerHTML=CHEAT_CAUSES.map(c=>
    `<div class="chip ${cheatCause===c?'on-red':''}" onclick="sc('${c}')">${c}</div>`).join('');
}
function sc(c){cheatCause=c;buildCheatChips()}
function confirmCheat(){
  const td=todayData();td.clean=false;td.cause=cheatCause;td.note=document.getElementById('cheatNote').value.trim();
  save();closeCheat();showToast('Enregistré. Demain tu reprends le feu. 💪','ko');render();
}
function saveJ(){
  const el=document.getElementById('jInput');const text=el?.value?.trim();if(!text)return;
  const td=todayData();
  state.journal=[...(state.journal||[]),{date:todayStr(),text,streak:getStreak(),clean:td.clean}];
  save();showToast('Journal enregistré ✓','ok');render();
}
function prevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--}render()}
function nextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++}render()}

function showToast(msg,type='ok'){
  const old=document.getElementById('toast');if(old)old.remove();
  const el=document.createElement('div');
  el.id='toast';el.className='toast '+type;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
save();
if(!state.days[todayStr()])state.days[todayStr()]={clean:null,water:0,meals:{}};
save();render();
setInterval(save,10000);
window.addEventListener('pagehide',save);
window.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')save()});
</script>
